<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Recorder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .audio-toggles {
            display: flex;
            gap: 24px;
            margin-bottom: 4px;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #ccc;
            cursor: pointer;
            user-select: none;
        }

        .toggle-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #dc3545;
            cursor: pointer;
        }

        .btn-row {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-record {
            background: #dc3545;
            color: #fff;
        }

        .btn-record:hover:not(:disabled) {
            background: #c82333;
        }

        .btn-pause {
            background: #ffc107;
            color: #000;
        }

        .btn-pause:hover:not(:disabled) {
            background: #e0a800;
        }

        .btn-stop {
            background: #555;
            color: #fff;
        }

        .btn-stop:hover:not(:disabled) {
            background: #444;
        }

        .btn-download {
            background: #28a745;
            color: #fff;
        }

        .btn-download:hover:not(:disabled) {
            background: #218838;
        }

        .recording-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            height: 28px;
        }

        .red-dot {
            width: 12px;
            height: 12px;
            background: #dc3545;
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }

        .paused-indicator {
            animation: none;
            background: #ffc107;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .timer {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 18px;
            color: #fff;
        }

        .preview-section {
            margin-top: 32px;
            width: 100%;
            max-width: 800px;
            display: none;
        }

        .preview-section.visible {
            display: block;
        }

        .preview-section h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #ccc;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Screen Recorder</h1>
    <p class="subtitle">Record your screen and download as WebM</p>

    <div class="controls">
        <div class="audio-toggles">
            <label class="toggle-label">
                <input type="checkbox" id="systemAudio" checked>
                System Audio
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="micAudio">
                Microphone
            </label>
        </div>

        <div class="recording-status" id="recordingStatus">
        </div>

        <div class="btn-row">
            <button type="button" class="btn-record" id="btnRecord">Start Recording</button>
            <button type="button" class="btn-pause" id="btnPause" disabled>Pause</button>
            <button type="button" class="btn-stop" id="btnStop" disabled>Stop</button>
        </div>

        <div class="btn-row">
            <button type="button" class="btn-download" id="btnDownload" disabled>Download Recording</button>
        </div>

        <div class="error-message" id="errorMessage"></div>
    </div>

    <div class="preview-section" id="previewSection">
        <h2>Preview</h2>
        <video id="previewVideo" controls></video>
    </div>

    <script>
        const btnRecord = document.getElementById('btnRecord');
        const btnPause = document.getElementById('btnPause');
        const btnStop = document.getElementById('btnStop');
        const btnDownload = document.getElementById('btnDownload');
        const systemAudioCheckbox = document.getElementById('systemAudio');
        const micAudioCheckbox = document.getElementById('micAudio');
        const recordingStatus = document.getElementById('recordingStatus');
        const previewSection = document.getElementById('previewSection');
        const previewVideo = document.getElementById('previewVideo');
        const errorMessage = document.getElementById('errorMessage');

        let mediaRecorder = null;
        let recordedChunks = [];
        let recordingBlob = null;
        let timerInterval = null;
        let elapsedSeconds = 0;
        let screenStream = null;
        let micStream = null;
        let combinedStream = null;

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('visible');
        }

        function clearError() {
            errorMessage.textContent = '';
            errorMessage.classList.remove('visible');
        }

        function formatTime(totalSeconds) {
            const hrs = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const mins = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const secs = (totalSeconds % 60).toString().padStart(2, '0');
            return `${hrs}:${mins}:${secs}`;
        }

        function startTimer() {
            elapsedSeconds = 0;
            timerInterval = setInterval(function() {
                elapsedSeconds++;
                const timerEl = document.querySelector('.timer');
                if (timerEl) timerEl.textContent = formatTime(elapsedSeconds);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function setRecordingUI(state) {
            if (state === 'recording') {
                recordingStatus.innerHTML = '<div class="red-dot"></div><span class="timer">00:00:00</span>';
                btnRecord.disabled = true;
                btnPause.disabled = false;
                btnStop.disabled = false;
                btnDownload.disabled = true;
                systemAudioCheckbox.disabled = true;
                micAudioCheckbox.disabled = true;
                previewSection.classList.remove('visible');
            } else if (state === 'paused') {
                var dot = document.querySelector('.red-dot');
                if (dot) dot.classList.add('paused-indicator');
                btnPause.textContent = 'Resume';
            } else if (state === 'resumed') {
                var dot = document.querySelector('.red-dot');
                if (dot) dot.classList.remove('paused-indicator');
                btnPause.textContent = 'Pause';
            } else if (state === 'stopped') {
                recordingStatus.innerHTML = '';
                btnRecord.disabled = false;
                btnPause.disabled = true;
                btnPause.textContent = 'Pause';
                btnStop.disabled = true;
                systemAudioCheckbox.disabled = false;
                micAudioCheckbox.disabled = false;
            }
        }

        function startRecording() {
            clearError();
            recordedChunks = [];
            recordingBlob = null;

            var displayMediaOptions = {
                video: { cursor: "always" },
                audio: systemAudioCheckbox.checked
            };

            navigator.mediaDevices.getDisplayMedia(displayMediaOptions).then(function(stream) {
                screenStream = stream;
                var tracks = [];
                for (var i = 0; i < stream.getTracks().length; i++) {
                    tracks.push(stream.getTracks()[i]);
                }

                if (micAudioCheckbox.checked) {
                    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(mic) {
                        micStream = mic;
                        var micTracks = mic.getAudioTracks();
                        for (var j = 0; j < micTracks.length; j++) {
                            tracks.push(micTracks[j]);
                        }
                        beginRecording(tracks);
                    }).catch(function(err) {
                        console.warn('Microphone access denied, continuing without mic:', err);
                        beginRecording(tracks);
                    });
                } else {
                    beginRecording(tracks);
                }
            }).catch(function(err) {
                if (err.name === 'NotAllowedError') {
                    showError('Screen sharing was cancelled.');
                } else {
                    showError('Failed to access screen: ' + err.message);
                }
                console.error('getDisplayMedia error:', err);
            });
        }

        function beginRecording(tracks) {
            combinedStream = new MediaStream(tracks);

            var mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
                ? 'video/webm;codecs=vp9,opus'
                : 'video/webm';

            mediaRecorder = new MediaRecorder(combinedStream, { mimeType: mimeType });

            mediaRecorder.ondataavailable = function(event) {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = function() {
                stopTimer();
                setRecordingUI('stopped');
                stopAllStreams();

                recordingBlob = new Blob(recordedChunks, { type: 'video/webm' });
                var previewUrl = URL.createObjectURL(recordingBlob);
                previewVideo.src = previewUrl;
                previewSection.classList.add('visible');
                btnDownload.disabled = false;
            };

            screenStream.getVideoTracks()[0].onended = function() {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
            };

            mediaRecorder.start(1000);
            setRecordingUI('recording');
            startTimer();
        }

        function pauseRecording() {
            if (!mediaRecorder) return;

            if (mediaRecorder.state === 'recording') {
                mediaRecorder.pause();
                stopTimer();
                setRecordingUI('paused');
            } else if (mediaRecorder.state === 'paused') {
                mediaRecorder.resume();
                timerInterval = setInterval(function() {
                    elapsedSeconds++;
                    var timerEl = document.querySelector('.timer');
                    if (timerEl) timerEl.textContent = formatTime(elapsedSeconds);
                }, 1000);
                setRecordingUI('resumed');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        function stopAllStreams() {
            if (screenStream) {
                screenStream.getTracks().forEach(function(t) { t.stop(); });
                screenStream = null;
            }
            if (micStream) {
                micStream.getTracks().forEach(function(t) { t.stop(); });
                micStream = null;
            }
            combinedStream = null;
        }

        function downloadRecording() {
            if (!recordingBlob) return;

            var timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            var filename = 'recording-' + timestamp + '.webm';

            var url = URL.createObjectURL(recordingBlob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        btnRecord.onclick = startRecording;
        btnPause.onclick = pauseRecording;
        btnStop.onclick = stopRecording;
        btnDownload.onclick = downloadRecording;
    </script>
</body>
</html>
