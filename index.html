<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>screen recorder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            user-select: none;
            -webkit-user-select: none;
        }
        input, textarea, [contenteditable="true"], .selectable, .selectable * {
            user-select: text;
            -webkit-user-select: text;
        }
        * { caret-color: transparent; }
        input, textarea, [contenteditable="true"] { caret-color: auto; }
        button:focus, [role="button"]:focus, a:focus { outline: none; }
        button:focus-visible, [role="button"]:focus-visible, a:focus-visible,
        select:focus-visible, input:focus-visible, textarea:focus-visible {
            outline: 2px solid #4a9eff;
            outline-offset: 2px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        main {
            width: 100%;
            max-width: 720px;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }

        section { margin-bottom: 24px; }

        .toggles {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #ccc;
            cursor: pointer;
        }

        .toggle input { accent-color: #dc3545; cursor: pointer; }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            height: 22px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            color: #fff;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
        }

        .dot.recording {
            background: #dc3545;
            animation: pulse 1.1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 11px 22px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: #fff;
            transition: background 0.15s, opacity 0.15s;
        }

        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary { background: #dc3545; }
        .btn-primary:hover:not(:disabled) { background: #c82333; }
        .btn-secondary { background: #444; }
        .btn-secondary:hover:not(:disabled) { background: #555; }
        .btn-success { background: #28a745; }
        .btn-success:hover:not(:disabled) { background: #218838; }

        .error {
            color: #ff6b6b;
            font-size: 13px;
            background: rgba(220, 53, 69, 0.08);
            border: 1px solid rgba(220, 53, 69, 0.25);
            padding: 10px 12px;
            border-radius: 6px;
            display: none;
        }

        .error.visible { display: block; }

        .live-preview canvas,
        .live-preview video,
        .preview video {
            width: 100%;
            background: #000;
            border-radius: 8px;
            display: block;
        }

        h2 {
            font-size: 14px;
            font-weight: 500;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .downloads {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <main>
        <h1>screen recorder</h1>
        <p class="subtitle">window + audio + webcam, recorded as a single file</p>

        <section class="toggles">
            <label class="toggle"><input type="checkbox" id="opt-mic" checked> microphone</label>
            <label class="toggle"><input type="checkbox" id="opt-sys"> system audio</label>
            <label class="toggle"><input type="checkbox" id="opt-cam" checked> webcam overlay</label>
        </section>

        <section class="status">
            <span class="dot" id="dot"></span>
            <span id="timer">00:00:00</span>
        </section>

        <section class="controls">
            <button id="btn-start" class="btn-primary">Start recording</button>
            <button id="btn-stop" class="btn-secondary" disabled>Stop</button>
        </section>

        <p class="error" id="error"></p>

        <section class="live-preview hidden" id="live-preview">
            <h2>recording — live preview</h2>
            <canvas id="live-canvas"></canvas>
        </section>

        <section class="preview hidden" id="preview">
            <h2>recorded</h2>
            <video id="preview-video" controls></video>
            <div class="downloads">
                <button id="btn-dl-webm" class="btn-success">Download .webm</button>
                <button id="btn-dl-mp4" class="btn-secondary">Download .mp4</button>
            </div>
        </section>
    </main>

    <script>
        // ---------- DOM ----------
        const $ = function(id) { return document.getElementById(id); };
        const ui = {
            optMic: $('opt-mic'),
            optSys: $('opt-sys'),
            optCam: $('opt-cam'),
            btnStart: $('btn-start'),
            btnStop: $('btn-stop'),
            dot: $('dot'),
            timer: $('timer'),
            error: $('error'),
            livePreview: $('live-preview'),
            liveCanvas: $('live-canvas'),
            preview: $('preview'),
            previewVideo: $('preview-video'),
            btnDlWebm: $('btn-dl-webm'),
            btnDlMp4: $('btn-dl-mp4'),
        };

        // ---------- State ----------
        let screenStream = null;
        let micStream = null;
        let webcamStream = null;
        let audioCtx = null;
        let audioDest = null;

        let screenVideo = null;
        let webcamVideo = null;
        let canvas = null;
        let ctx = null;

        let recorder = null;
        let chunks = [];
        let recordedBlob = null;
        let recordedMimeType = '';
        let canvasStream = null;

        let drawHandle = null;
        let lastDrawTime = 0;
        const DRAW_FPS = 30;

        let timerHandle = null;
        let elapsedSeconds = 0;

        let previewObjectUrl = null;

        // ---------- Utilities ----------
        function showError(msg) {
            ui.error.textContent = msg;
            ui.error.classList.add('visible');
        }

        function clearError() {
            ui.error.textContent = '';
            ui.error.classList.remove('visible');
        }

        function formatTime(s) {
            const hrs = Math.floor(s / 3600).toString().padStart(2, '0');
            const mins = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            const secs = (s % 60).toString().padStart(2, '0');
            return hrs + ':' + mins + ':' + secs;
        }

        function pickWebmMime() {
            const candidates = [
                'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp8,opus',
                'video/webm',
            ];
            for (let i = 0; i < candidates.length; i++) {
                if (MediaRecorder.isTypeSupported(candidates[i])) return candidates[i];
            }
            return 'video/webm';
        }

        function createMediaRecorder(stream) {
            const mimeType = pickWebmMime();
            try {
                recordedMimeType = mimeType;
                return new MediaRecorder(stream, { mimeType: mimeType });
            } catch (_) {
                recordedMimeType = '';
                return new MediaRecorder(stream);
            }
        }

        function timestampedName(ext) {
            const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            return 'recording-' + ts + '.' + ext;
        }

        function saveBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function requireCaptureSupport() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                throw new Error('Screen recording is not available in this browser. Use Chrome, Edge, or Firefox from a secure page.');
            }
            if (!window.MediaRecorder) {
                throw new Error('MediaRecorder is not available in this browser.');
            }
            if (!HTMLCanvasElement.prototype.captureStream) {
                throw new Error('Canvas capture is not available in this browser.');
            }
        }

        async function prepareVideo(video, stream) {
            video.srcObject = stream;
            video.muted = true;
            video.playsInline = true;

            if (!video.videoWidth || !video.videoHeight) {
                await new Promise(function(resolve, reject) {
                    const timeout = setTimeout(function() {
                        cleanup();
                        resolve();
                    }, 2500);
                    function cleanup() {
                        clearTimeout(timeout);
                        video.removeEventListener('loadedmetadata', onLoaded);
                        video.removeEventListener('error', onError);
                    }
                    function onLoaded() {
                        cleanup();
                        resolve();
                    }
                    function onError() {
                        cleanup();
                        reject(new Error('Could not read video metadata.'));
                    }
                    video.addEventListener('loadedmetadata', onLoaded, { once: true });
                    video.addEventListener('error', onError, { once: true });
                });
            }

            await video.play();
        }

        // ---------- Stream acquisition ----------
        // Requests screen first (the user-visible browser picker), then optionally
        // mic and webcam in parallel. Each optional source is independently
        // permitted; a denied webcam doesn't abort the recording.
        async function acquireStreams() {
            requireCaptureSupport();

            screenStream = await navigator.mediaDevices.getDisplayMedia({
                video: { frameRate: 30 },
                audio: ui.optSys.checked,
            });

            const pending = [];

            if (ui.optMic.checked) {
                pending.push(
                    navigator.mediaDevices.getUserMedia({ audio: true })
                        .then(function(s) { micStream = s; })
                        .catch(function(err) { console.warn('Mic denied:', err); micStream = null; })
                );
            }

            if (ui.optCam.checked) {
                pending.push(
                    navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 640 }, height: { ideal: 480 } },
                    })
                        .then(function(s) { webcamStream = s; })
                        .catch(function(err) { console.warn('Webcam denied:', err); webcamStream = null; })
                );
            }

            await Promise.all(pending);
        }

        // ---------- Audio mixing ----------
        // MediaRecorder only encodes the first audio track of its source stream,
        // so when system audio + mic are both present we mix them in WebAudio.
        function buildMixedAudioTrack() {
            const sources = [];
            if (screenStream && screenStream.getAudioTracks().length > 0) sources.push(screenStream);
            if (micStream && micStream.getAudioTracks().length > 0) sources.push(micStream);

            if (sources.length === 0) return null;
            if (sources.length === 1) return sources[0].getAudioTracks()[0];

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioDest = audioCtx.createMediaStreamDestination();
            sources.forEach(function(s) {
                audioCtx.createMediaStreamSource(s).connect(audioDest);
            });
            return audioDest.stream.getAudioTracks()[0];
        }

        // ---------- Canvas compositing ----------
        // Drawing the screen + webcam onto a canvas (and recording the canvas's
        // captureStream) bakes the webcam into the recorded frames regardless of
        // what the user shared with getDisplayMedia. No reliance on PiP being
        // visible to the screen-capture surface.
        async function setupCompositor() {
            screenVideo = document.createElement('video');
            await prepareVideo(screenVideo, screenStream);

            if (webcamStream) {
                webcamVideo = document.createElement('video');
                await prepareVideo(webcamVideo, webcamStream);
            }

            const videoTrack = screenStream.getVideoTracks()[0];
            const settings = videoTrack ? videoTrack.getSettings() : {};
            const width = screenVideo.videoWidth || settings.width || 1280;
            const height = screenVideo.videoHeight || settings.height || 720;

            canvas = ui.liveCanvas;
            canvas.width = width;
            canvas.height = height;
            ctx = canvas.getContext('2d', { alpha: false });
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            canvasStream = canvas.captureStream(DRAW_FPS);
        }

        function drawFrame(now) {
            if (now - lastDrawTime >= 1000 / DRAW_FPS) {
                lastDrawTime = now;
                if (screenVideo && screenVideo.readyState >= 2) {
                    ctx.drawImage(screenVideo, 0, 0, canvas.width, canvas.height);
                }
                if (webcamVideo && webcamVideo.readyState >= 2) {
                    drawWebcamOverlay();
                }
            }
            drawHandle = requestAnimationFrame(drawFrame);
        }

        function drawWebcamOverlay() {
            const W = canvas.width;
            const H = canvas.height;
            const wcW = Math.round(W * 0.18);
            const wcH = Math.round(wcW * 0.75); // 4:3
            const margin = Math.round(W * 0.012);
            const x = W - wcW - margin;
            const y = H - wcH - margin;
            const r = Math.round(wcW * 0.04);

            ctx.save();
            ctx.beginPath();
            roundedRectPath(ctx, x, y, wcW, wcH, r);
            ctx.clip();
            // Fill backdrop so transparent edges from rounding look clean.
            ctx.fillStyle = '#000';
            ctx.fillRect(x, y, wcW, wcH);
            ctx.drawImage(webcamVideo, x, y, wcW, wcH);
            ctx.restore();

            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.lineWidth = Math.max(2, Math.round(wcW * 0.012));
            ctx.beginPath();
            roundedRectPath(ctx, x, y, wcW, wcH, r);
            ctx.stroke();
            ctx.restore();
        }

        function roundedRectPath(ctx, x, y, w, h, r) {
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        // ---------- Timer ----------
        function startTimer() {
            elapsedSeconds = 0;
            ui.timer.textContent = formatTime(0);
            timerHandle = setInterval(function() {
                elapsedSeconds++;
                ui.timer.textContent = formatTime(elapsedSeconds);
            }, 1000);
        }

        function stopTimer() {
            if (timerHandle) clearInterval(timerHandle);
            timerHandle = null;
        }

        // ---------- Recording lifecycle ----------
        async function startRecording() {
            clearError();
            ui.btnStart.disabled = true;
            ui.btnStart.textContent = 'Starting…';
            ui.btnStop.disabled = true;

            // Tear down any prior preview
            ui.preview.classList.add('hidden');
            if (previewObjectUrl) { URL.revokeObjectURL(previewObjectUrl); previewObjectUrl = null; }
            ui.previewVideo.removeAttribute('src');
            ui.previewVideo.load();
            chunks = [];
            recordedBlob = null;

            try {
                await acquireStreams();
                await setupCompositor();

                const tracks = [];
                tracks.push(canvasStream.getVideoTracks()[0]);
                const audioTrack = buildMixedAudioTrack();
                if (audioTrack) tracks.push(audioTrack);

                const recordStream = new MediaStream(tracks);
                recorder = createMediaRecorder(recordStream);

                recorder.ondataavailable = function(e) {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                recorder.onerror = function(e) {
                    showError('Recorder error: ' + ((e.error && e.error.message) || 'unknown'));
                };
                recorder.onstop = onRecordingStopped;

                // User clicked the browser's "Stop sharing" bar → stop the recorder
                screenStream.getVideoTracks()[0].addEventListener('ended', function() {
                    if (recorder.state !== 'inactive') recorder.stop();
                });

                drawFrame(performance.now());
                drawHandle = requestAnimationFrame(drawFrame);
                recorder.start(1000);
                startTimer();

                ui.dot.classList.add('recording');
                ui.btnStart.textContent = 'Start recording';
                ui.btnStop.disabled = false;
                ui.livePreview.classList.remove('hidden');
            } catch (err) {
                const msg = err && err.name === 'NotAllowedError'
                    ? 'Screen share cancelled.'
                    : 'Could not start: ' + (err && err.message ? err.message : 'unknown');
                showError(msg);
                console.error('startRecording failed:', err);
                cleanupStreams();
                ui.btnStart.disabled = false;
                ui.btnStart.textContent = 'Start recording';
                ui.btnStop.disabled = true;
                ui.btnStop.textContent = 'Stop';
            }
        }

        function stopRecording() {
            ui.btnStop.disabled = true;
            ui.btnStop.textContent = 'Stopping…';
            if (recorder && recorder.state !== 'inactive') {
                recorder.stop();
            } else {
                onRecordingStopped();
            }
        }

        function onRecordingStopped() {
            if (drawHandle) { cancelAnimationFrame(drawHandle); drawHandle = null; }
            stopTimer();

            recordedBlob = new Blob(chunks, { type: recordedMimeType });
            if (recordedBlob.size > 0) {
                previewObjectUrl = URL.createObjectURL(recordedBlob);
                ui.previewVideo.src = previewObjectUrl;
                ui.preview.classList.remove('hidden');
                ui.btnDlWebm.disabled = false;
                ui.btnDlMp4.disabled = false;
            } else {
                showError('Recording stopped before any video data was captured.');
                ui.btnDlWebm.disabled = true;
                ui.btnDlMp4.disabled = true;
            }
            ui.livePreview.classList.add('hidden');

            ui.dot.classList.remove('recording');
            ui.btnStart.disabled = false;
            ui.btnStart.textContent = 'Start recording';
            ui.btnStop.disabled = true;
            ui.btnStop.textContent = 'Stop';

            ui.btnDlWebm.textContent = 'Download .webm';
            ui.btnDlMp4.textContent = 'Download .mp4';

            cleanupStreams();
            recorder = null;
        }

        function cleanupStreams() {
            [screenStream, micStream, webcamStream].forEach(function(s) {
                if (s) s.getTracks().forEach(function(t) { t.stop(); });
            });
            screenStream = micStream = webcamStream = null;

            if (screenVideo) { screenVideo.srcObject = null; screenVideo = null; }
            if (webcamVideo) { webcamVideo.srcObject = null; webcamVideo = null; }
            if (canvasStream) {
                canvasStream.getTracks().forEach(function(t) { t.stop(); });
                canvasStream = null;
            }
            if (audioCtx) {
                audioCtx.close().catch(function() {});
                audioCtx = null;
                audioDest = null;
            }
            lastDrawTime = 0;
        }

        // ---------- Downloads ----------
        function downloadWebm() {
            if (!recordedBlob) return;
            saveBlob(recordedBlob, timestampedName('webm'));
        }

        // ---------- ffmpeg.wasm — optional MP4 conversion ----------
        // The .webm download always works. MP4 conversion is opt-in: it loads
        // ~32 MB of ffmpeg core on first use, transcodes VP9 → H.264 and
        // Opus → AAC, then writes a Windows-friendly MP4 with the moov atom
        // at the front. If anything fails the user still has the .webm.
        let ffmpegPromise = null;
        function loadFfmpeg() {
            if (ffmpegPromise) return ffmpegPromise;
            ffmpegPromise = (async function() {
                const [ffmpegMod, utilMod] = await Promise.all([
                    import('https://esm.sh/@ffmpeg/ffmpeg@0.12.10'),
                    import('https://esm.sh/@ffmpeg/util@0.12.1'),
                ]);
                const ffmpeg = new ffmpegMod.FFmpeg();
                const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.10/dist/umd';
                await ffmpeg.load({
                    coreURL: await utilMod.toBlobURL(baseURL + '/ffmpeg-core.js', 'text/javascript'),
                    wasmURL: await utilMod.toBlobURL(baseURL + '/ffmpeg-core.wasm', 'application/wasm'),
                });
                return ffmpeg;
            })().catch(function(err) {
                ffmpegPromise = null;
                throw err;
            });
            return ffmpegPromise;
        }

        async function downloadMp4() {
            if (!recordedBlob) return;
            ui.btnDlMp4.disabled = true;
            ui.btnDlMp4.textContent = 'Loading ffmpeg…';

            let progressListener = null;
            try {
                const ffmpeg = await loadFfmpeg();

                ui.btnDlMp4.textContent = 'Converting… 0%';
                progressListener = function(e) {
                    const pct = Math.max(0, Math.min(100, Math.round((e.progress || 0) * 100)));
                    ui.btnDlMp4.textContent = 'Converting… ' + pct + '%';
                };
                ffmpeg.on('progress', progressListener);

                const ab = await recordedBlob.arrayBuffer();
                await ffmpeg.writeFile('in.webm', new Uint8Array(ab));
                await ffmpeg.exec([
                    '-i', 'in.webm',
                    '-c:v', 'libx264', '-preset', 'veryfast', '-crf', '20',
                    '-c:a', 'aac', '-b:a', '192k',
                    '-movflags', '+faststart',
                    'out.mp4',
                ]);
                const data = await ffmpeg.readFile('out.mp4');
                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                saveBlob(blob, timestampedName('mp4'));

                try { await ffmpeg.deleteFile('in.webm'); } catch (_) {}
                try { await ffmpeg.deleteFile('out.mp4'); } catch (_) {}

                ui.btnDlMp4.textContent = 'Downloaded';
                setTimeout(function() {
                    ui.btnDlMp4.textContent = 'Download .mp4';
                    ui.btnDlMp4.disabled = false;
                }, 2000);
            } catch (err) {
                console.error('MP4 conversion failed:', err);
                showError('MP4 conversion failed: ' + (err && err.message ? err.message : 'unknown') + '. The .webm download still works.');
                ui.btnDlMp4.textContent = 'Download .mp4';
                ui.btnDlMp4.disabled = false;
            } finally {
                if (progressListener && ffmpegPromise) {
                    try {
                        const ffmpeg = await ffmpegPromise;
                        ffmpeg.off('progress', progressListener);
                    } catch (_) {}
                }
            }
        }

        // ---------- Wiring ----------
        ui.btnStart.onclick = startRecording;
        ui.btnStop.onclick = stopRecording;
        ui.btnDlWebm.onclick = downloadWebm;
        ui.btnDlMp4.onclick = downloadMp4;
    </script>
</body>
</html>
